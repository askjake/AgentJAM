<!DOCTYPE html>
<html>
<head><title>CORS Test</title></head>
<body>
<h1>CORS Test</h1>
<button onclick="test()">Test CORS</button>
<div id="result"></div>
<script>
async function test() {
    try {
        const r = await fetch('http://10.79.81.39:8000/rest/api/v1/health');
        document.getElementById('result').innerHTML = '<p style="color:green">✅ CORS WORKS! Status: ' + r.status + '</p>';
    } catch(e) {
        document.getElementById('result').innerHTML = '<p style="color:red">❌ CORS ERROR: ' + e.message + '</p>';
    }
}
window.onload = test;
</script>
</body>
</html>
